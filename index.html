<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <!-- อนุญาตให้ผู้ใช้ถ่างซูมจอได้เพื่อความอิสระเต็มที่ -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5.0, user-scalable=yes">
  <title>Smart Hemo-Hub E-Book</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Kanit', 'sans-serif'] },
          colors: {
            mint: { 50: '#f0fdfa', 100: '#ccfbf1', 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488' },
            slate: { 50: '#f8fafc', 500: '#64748b', 700: '#334155' }
          }
        }
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Kanit', sans-serif;
      background: linear-gradient(160deg, #f0fdfa 0%, #ccfbf1 50%, #f0fdfa 100%);
      min-height: 100vh;
    }

    /* ── Animations ── */
    .float { animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
    .pulse-soft { animation: pulseSoft 2s infinite; }
    @keyframes pulseSoft { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.05); } }

    /* ── Header ── */
    .header-card {
      background: linear-gradient(135deg, #0d9488 0%, #14b8a6 55%, #2dd4bf 100%);
      border-radius: 2rem; padding: 24px 32px;
      box-shadow: 0 8px 30px rgba(13, 148, 136, 0.4); margin-bottom: 32px;
    }

    /* ── ชั้นหนังสือ ── */
    .room {
      background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
      border-radius: 2rem; padding: 20px 20px 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1), inset 0 2px 0 #ffffff;
      position: relative; overflow: hidden; border: 1px solid #e2e8f0;
    }
    .shelf-plank {
      height: 15px; background: linear-gradient(180deg,#cbd5e1 0%,#94a3b8 100%);
      border-radius: 10px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); margin-bottom: 28px;
    }
    .book-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; align-items: flex-end; padding: 16px 4px 0; }
    @media (max-width: 500px)  { .book-row { grid-template-columns: repeat(2,1fr); gap:8px; } }
    @media (min-width:501px) and (max-width:820px) { .book-row { grid-template-columns: repeat(3,1fr); } }

    /* ── หนังสือ 3D ── */
    .book-scene { perspective: 800px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
    .book-3d { width: 100%; max-width: 130px; height: 175px; position: relative; transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(0.23,1,0.32,1); filter: drop-shadow(3px 6px 12px rgba(0,0,0,0.2)); }
    .book-scene:hover .book-3d { transform: rotateY(-25deg) translateX(5px) translateY(-10px); filter: drop-shadow(7px 14px 20px rgba(0,0,0,0.3)); }
    .book-cover { position: absolute; inset: 0; border-radius: 2px 12px 12px 2px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px 10px; text-align: center; color: white; font-size: 14px; font-weight: 600; line-height: 1.4; transform: translateZ(9px); }
    .book-cover::before { content: ''; position: absolute; top:0; left:0; width:14px; height:100%; background: linear-gradient(to right, rgba(0,0,0,0.2), rgba(0,0,0,0.05), transparent); }
    .book-spine-face { position: absolute; top:0; left:0; width:14px; height:175px; transform-origin: left center; transform: rotateY(90deg) translateX(7px); border-radius: 2px 0 0 2px; display: flex; align-items: center; justify-content: center; padding: 4px 2px; overflow: hidden; }
    .book-spine-face span { writing-mode: vertical-rl; transform: rotate(180deg); color: rgba(255,255,255,0.9); font-size: 8px; white-space: nowrap; overflow: hidden; }
    
    .book-actions { display: flex; gap: 7px; margin-top: 9px; opacity: 0; transform: translateY(4px); transition: all 0.2s; pointer-events: none; }
    .book-scene:hover .book-actions { opacity:1; transform:translateY(0); pointer-events:auto; }
    .bk-btn { width:28px; height:28px; border-radius:50%; background:white; border:none; cursor:pointer; font-size:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1); display:flex; align-items:center; justify-content:center; }
    .bk-edit  { color:#0d9488; } .bk-del { color:#ef4444; } .bk-share { color:#10b981; }

    @media (max-width: 640px) {
      .book-3d { max-width: 150px; height: 195px; } 
      .book-cover { font-size: 24px !important; padding: 16px; }
      .book-spine-face span { font-size: 14px !important; }
      .book-spine-face { height: 195px; }
      .book-actions { opacity: 1; transform: none; pointer-events: auto; } 
    }

    /* ── E-Book Reader (The Perfect Native Zoom Framework) ── */
    #readerOverlay { position:fixed; inset:0; background:#111; z-index:300; display:none; flex-direction:column; }
    .rd-topbar { flex-shrink:0; display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:rgba(0,0,0,0.8); }
    .rd-title { color:#2dd4bf; font-size:17px; font-weight:600; display:flex; align-items:center; gap:8px; }
    .rd-close { flex-shrink:0; width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,0.1); border:none; color:white; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    
    .rd-stage { flex:1; display:flex; align-items:center; min-height:0; overflow:hidden; position: relative; }
    .rd-nav { flex-shrink:0; width:48px; height:100%; background:transparent; border:none; color:rgba(255,255,255,0.45); font-size:24px; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:20; }
    .rd-nav:hover:not(:disabled) { color:#2dd4bf; background:rgba(255,255,255,0.05); }

    /* เคล็ดลับการซูม: ให้พื้นที่เลื่อนได้แบบ Native Overflow */
    #rdScroll {
      flex:1; overflow:auto; width:100%; height:100%;
      display:flex; padding:20px;
      align-items:center; justify-content:center; 
      /* เลื่อนสมูทบน iOS */
      -webkit-overflow-scrolling: touch; 
    }

    /* Book Container ที่ขยายขนาดด้วย Width/Height แทน Transform */
    #rdBook { 
      position:relative; flex-shrink:0; box-shadow:0 12px 50px rgba(0,0,0,0.5); 
      transform-origin: top left;
    }
    
    .rd-half { position:absolute; top:0; overflow:hidden; background:#fff; }
    #rdHalfL { border-radius:8px 0 0 8px; }
    #rdHalfR { border-radius:0 8px 8px 0; }
    .rd-face img { width: 100% !important; height: 100% !important; display:block; }

    /* Loading Screen */
    #rdLoading { position:fixed; inset:0; z-index:400; background:linear-gradient(160deg,#0f172a 0%,#1e293b 100%); display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; }
    .rdl-icon { font-size:56px; color:#2dd4bf; margin-bottom:20px; animation:float 2s ease-in-out infinite; }
    .rdl-bar-wrap { width:min(320px,80vw); height:8px; background:rgba(255,255,255,0.1); border-radius:1rem; overflow:hidden; }
    #rdProgBar { height:100%; width:0%; background:linear-gradient(to right,#0d9488,#2dd4bf); border-radius:1rem; transition:width 0.25s ease; }
    
    /* สกอลบาร์แบบสวยงาม */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="p-4 md:p-8">
<div class="max-w-6xl mx-auto">

  <div class="header-card">
    <div class="flex flex-col sm:flex-row justify-between items-center gap-5">
      <div class="flex items-center gap-4">
        <div class="w-20 h-20 bg-mint-50 rounded-[2rem] flex items-center justify-center shadow-inner">
          <img src="https://cdn-icons-png.flaticon.com/512/8150/8150654.png" class="w-16 h-16 float" alt="Nurse">
        </div>
        <div>
          <h1 class="text-3xl md:text-4xl font-bold text-white">Smart Hemo-Hub</h1>
          <h2 class="text-xl md:text-2xl font-semibold text-mint-100 mt-0.5">คลังข้อมูลอิเล็กทรอนิกส์</h2>
        </div>
      </div>
      <button onclick="openForm()" class="bg-white text-mint-600 px-8 py-4 rounded-[2rem] shadow-lg hover:-translate-y-1 hover:shadow-xl transition-all font-bold flex items-center gap-2">

  </div>
  
  <div id="stateShelf" class="hidden">
    <div id="shelfContainer" class="room"></div>
  </div>

</div>

<!-- Modal Form -->
<div id="formModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
  <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-md p-8 relative">

    <div class="flex items-center gap-3 mb-6">
      <div class="w-12 h-12 bg-mint-100 rounded-[1.2rem] flex items-center justify-center">
        <i class="fas fa-book-medical text-mint-600 text-xl"></i>

      <h2 id="modalTitle" class="text-2xl font-bold text-mint-600">ลงทะเบียนข้อมูลใหม่</h2>
    </div>
    <form id="bookForm" onsubmit="handleSave(event)">
      <input type="hidden" id="rowIndex">
      <input type="hidden" id="existingUrl">

      <div class="mb-5">
        <label class="block text-sm font-semibold text-slate-500 mb-2">หัวข้อ / ชื่อเรื่อง</label>
        <input type="text" id="bookTitle" required placeholder="ระบุชื่อเรื่อง..." class="w-full px-5 py-4 bg-slate-50 rounded-2xl ring-1 ring-slate-200 focus:ring-2 focus:ring-mint-400 outline-none transition-all text-slate-700">

      </div>
    </form>
  </div>
</div>

<!-- E-BOOK READER -->
<div id="readerOverlay">
  <div id="rdLoading">
    <i class="fas fa-book-medical rdl-icon"></i>
    <div class="text-lg font-bold mb-2">กำลังโหลดความคมชัดสูง...</div>
    <div class="rdl-bar-wrap mb-4"><div id="rdProgBar"></div></div>
    <div class="text-mint-400 font-bold text-2xl" id="rdLoadPct">0%</div>
  </div>

  <div class="rd-topbar">
    <div class="rd-title"><i class="fas fa-book-open"></i><span id="readerTitle" class="ml-2"></span></div>
    <div class="flex items-center gap-4">
      <span id="zoomLabel" class="text-sm text-mint-100 font-semibold bg-white/10 px-3 py-1 rounded-full cursor-pointer" onclick="rdSetZoom(1.0)">100%</span>
      <button class="rd-close" onclick="closeReader()"><i class="fas fa-times text-lg"></i></button>
    </div>
  </div>

  <div class="rd-stage">
    <button class="rd-nav" id="btnPrev" onclick="rdGoPrev()"><i class="fas fa-chevron-left"></i></button>
    
    <!-- กล่องหลักสำหรับให้เลื่อนจอได้อิสระ -->
    <div id="rdScroll">
      <div id="rdBook">
        <div class="rd-half" id="rdHalfL"></div>
        <div class="rd-half" id="rdHalfR"></div>
      </div>
    </div>

    <button class="rd-nav" id="btnNext" onclick="rdGoNext()"><i class="fas fa-chevron-right"></i></button>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ==========================================
// 🔗 API BRIDGE (ตั้งค่าลิงก์ GAS ของคุณที่นี่)
// ==========================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbygfy7yad290Ox_Kdat3HqLPZm_2HhsiSwsFPl7SEZm6M3UXz604LT1hK9LvYMkhWuDYw/exec'; 

var DEL_PASS = '1234';
var BOOKS_PER_SHELF = 4;
// โทนสีหนังสือเป็น Mint / Teal / Indigo พาสเทล
var PALETTE = [['#14b8a6','#0f766e'],['#0ea5e9','#0369a1'],['#8b5cf6','#5b21b6'],['#3b82f6','#1d4ed8'],['#10b981','#047857']];
var bookData = [];

function callBackend(action, payload = {}) {
  return new Promise((resolve, reject) => {
    if (typeof google !== 'undefined' && google.script) {
      if (action === 'getBooks') google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).getBooks();
      else if (action === 'getPdfData') google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).getPdfData(payload.fileId);
      else if (action === 'saveBook') google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).saveBook(payload);
      else if (action === 'deleteBook') google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).deleteBook(payload.rowIndex, payload.fileId);
    } else {
      fetch(GAS_URL + "?action=" + action, { method: "POST", body: JSON.stringify(payload), headers: { "Content-Type": "text/plain;charset=utf-8" } })
      .then(res => res.json()).then(data => { if (data && data.error) reject(new Error(data.error)); else resolve(data); }).catch(reject);
    }
  });
}

window.onload = loadBooks;

function loadBooks() {
  callBackend('getBooks').then(res => {
    document.getElementById('stateLoading').classList.add('hidden');
    if (!res || res.length === 0) return;
    bookData = res; renderBooks();
    document.getElementById('stateShelf').classList.remove('hidden');
  }).catch(err => Swal.fire('Error', err.message, 'error'));
}

function renderBooks() {
  var container = document.getElementById('shelfContainer');
  container.innerHTML = '';
  for (var i = 0; i < bookData.length; i += BOOKS_PER_SHELF) {
    var batch = bookData.slice(i, i + BOOKS_PER_SHELF);
    var unit = document.createElement('div'); unit.className = 'shelf-unit';
    var row = document.createElement('div'); row.className = 'book-row';
    batch.forEach((book, bi) => row.appendChild(makeBook(book, i + bi)));
    var plank = document.createElement('div'); plank.className = 'shelf-plank';
    unit.appendChild(row); unit.appendChild(plank); container.appendChild(unit);
  }
}

function makeBook(book, idx) {
  var pair = PALETTE[idx % PALETTE.length];
  var title = String(book['Book Title']);
  var eT = title.replace(/'/g,"\\'").replace(/"/g,'&quot;');
  
  var scene = document.createElement('div'); scene.className = 'book-scene';
  scene.innerHTML = `
    <div class="book-3d" onclick="openReader('${book['File ID']}', '${eT}')">
      <div class="book-spine-face" style="background:${pair[1]};"><span>${title}</span></div>
      <div class="book-cover" style="background:linear-gradient(150deg,${pair[0]},${pair[1]});"><i class="fas fa-book-medical text-white/30 text-3xl mb-3"></i><span>${title}</span></div>
    </div>
    <div class="book-actions">
      <button class="bk-btn bk-edit" onclick="event.stopPropagation();openForm(true,${book.rowIndex})"><i class="fas fa-pen"></i></button>
      <button class="bk-btn bk-del" onclick="event.stopPropagation();confirmDelete(${book.rowIndex},'${book['File ID']}')"><i class="fas fa-trash"></i></button>
    </div>`;
  return scene;
}

// ==========================================
// 🚀 PERFECT E-BOOK READER (Zoom & Pan)
// ==========================================
var rdURLs = []; var rdLeft = -1; var rdRight = 0; var rdPageW = 0; var rdPageH = 0; var rdZoom = 1.0; var rdMobile = false;

function openReader(fileId, title) {
  if (!fileId) return;
  document.getElementById('readerTitle').textContent = title;
  document.getElementById('readerOverlay').style.display = 'flex';
  document.getElementById('rdLoading').style.display = 'flex';
  rdURLs = []; rdSetZoom(1.0);

  callBackend('getPdfData', { fileId: fileId }).then(res => buildReader(res.data)).catch(err => Swal.fire('Error', err.message, 'error'));
}

async function buildReader(b64) {
  try {
    var bin = atob(b64), bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    var pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
    
    rdMobile = window.innerWidth < 768;
    
    // 💡 ปลดล็อคความกว้างให้เต็มจอคอมพิวเตอร์
    var vw = window.innerWidth, vh = window.innerHeight;
    var maxW = rdMobile ? vw : (vw - 100) / 2; // ยืดได้สุดจอใน PC
    var maxH = vh - 100;
    
    var pg0 = await pdf.getPage(1); var vp0 = pg0.getViewport({ scale: 1 });
    var scale = Math.min(maxW / vp0.width, maxH / vp0.height, 5.0);
    
    // 🔥 บังคับ Render ที่ความละเอียด 2 เท่า เพื่อให้ซูมแล้วตัวหนังสือคมกริบ
    var renderScale = scale * 2.0; 

    rdPageW = Math.ceil(vp0.width * scale); 
    rdPageH = Math.ceil(vp0.height * scale);

    for (var p = 1; p <= pdf.numPages; p++) {
      var pct = Math.round(p / pdf.numPages * 100);
      document.getElementById('rdProgBar').style.width = pct + '%';
      document.getElementById('rdLoadPct').textContent = pct + '%';
      
      var page = await pdf.getPage(p);
      var vp = page.getViewport({ scale: renderScale });
      var c = document.createElement('canvas'); c.width = vp.width; c.height = vp.height;
      await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
      rdURLs.push(c.toDataURL());
    }
    
    document.getElementById('rdLoading').style.display = 'none';
    rdLeft = rdMobile ? 0 : -1; rdRight = rdMobile ? -1 : 0; 
    rdRenderBook();
  } catch(err) { Swal.fire('Error', err.message, 'error'); }
}

// จัดเรียงหน้ากระดาษ
function rdRenderBook() {
  var w = Math.round(rdPageW * rdZoom); 
  var h = Math.round(rdPageH * rdZoom); 
  var book = document.getElementById('rdBook');

  // ปรับ CSS Dimensions โดยตรงเพื่อให้ Scrollbar Native ทำงาน
  if (rdMobile) {
    book.style.width = w + 'px'; book.style.height = h + 'px';
    document.getElementById('rdHalfL').style.cssText = `position:absolute;top:0;left:0;width:${w}px;height:${h}px;background:#fff;border-radius:8px;`;
    document.getElementById('rdHalfR').style.display = 'none';
  } else {
    book.style.width = (w*2) + 'px'; book.style.height = h + 'px';
    document.getElementById('rdHalfL').style.cssText = `position:absolute;top:0;left:0;width:${w}px;height:${h}px;background:#fff;border-radius:8px 0 0 8px;`;
    document.getElementById('rdHalfR').style.cssText = `position:absolute;top:0;left:${w}px;width:${w}px;height:${h}px;background:#fff;border-radius:0 8px 8px 0;`;
    document.getElementById('rdHalfR').style.display = 'block';
  }

  document.getElementById('rdHalfL').innerHTML = rdURLs[rdLeft] ? `<img src="${rdURLs[rdLeft]}">` : '';
  if(!rdMobile) document.getElementById('rdHalfR').innerHTML = rdURLs[rdRight] ? `<img src="${rdURLs[rdRight]}">` : '';
  
  // ซ่อนปุ่มเลื่อนถ้าสุดทาง
  document.getElementById('btnPrev').style.visibility = (rdMobile ? rdLeft <= 0 : rdLeft <= -1) ? 'hidden' : 'visible';
  document.getElementById('btnNext').style.visibility = (rdMobile ? rdLeft+1 >= rdURLs.length : rdRight+1 >= rdURLs.length) ? 'hidden' : 'visible';
}

function rdGoNext() {
  if (rdMobile) { if(rdLeft+1 < rdURLs.length) { rdLeft++; rdRenderBook(); } }
  else { if(rdRight+1 < rdURLs.length) { rdLeft+=2; rdRight+=2; rdRenderBook(); } }
}
function rdGoPrev() {
  if (rdMobile) { if(rdLeft > 0) { rdLeft--; rdRenderBook(); } }
  else { if(rdLeft >= 0) { rdLeft-=2; rdRight-=2; rdRenderBook(); } }
}

// 🔥 ระบบ Pinch-to-Zoom ที่แม่นยำ (คำนวณจุด Centroid)
var scrollContainer = document.getElementById('rdScroll');
var initialPinchDist = 0; var initialZoom = 1; var centroid = {x:0, y:0}; var startScroll = {x:0, y:0};

scrollContainer.addEventListener('touchstart', function(e) {
  if (e.touches.length === 2) {
    var t1 = e.touches[0], t2 = e.touches[1];
    initialPinchDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
    initialZoom = rdZoom;
    
    // คำนวณจุดกึ่งกลางของนิ้วทั้งสอง
    centroid.x = (t1.clientX + t2.clientX) / 2;
    centroid.y = (t1.clientY + t2.clientY) / 2;
    
    var rect = scrollContainer.getBoundingClientRect();
    startScroll = {
      x: scrollContainer.scrollLeft, y: scrollContainer.scrollTop,
      cx: centroid.x - rect.left, cy: centroid.y - rect.top
    };
  }
}, {passive: false});

scrollContainer.addEventListener('touchmove', function(e) {
  if (e.touches.length === 2) {
    e.preventDefault(); // ป้องกันจอขยับ
    var t1 = e.touches[0], t2 = e.touches[1];
    var dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
    
    var newZoom = initialZoom * (dist / initialPinchDist);
    rdSetZoom(newZoom);

    // ปรับ Scroll ให้รักษาตำแหน่งกึ่งกลางนิ้วไว้ (เลิก Tug-of-war)
    var zoomRatio = rdZoom / initialZoom;
    scrollContainer.scrollLeft = (startScroll.x + startScroll.cx) * zoomRatio - startScroll.cx;
    scrollContainer.scrollTop = (startScroll.y + startScroll.cy) * zoomRatio - startScroll.cy;
  }
}, {passive: false});

function rdSetZoom(z) {
  rdZoom = Math.max(1.0, Math.min(z, 5.0)); // ต่ำสุด 100% สูงสุด 500%
  document.getElementById('zoomLabel').textContent = Math.round(rdZoom*100) + '%';
  
  // ปลด Center Alignment ถ้ายูสเซอร์ซูม เพื่อให้เลื่อนไปดูมุมบนซ้ายได้
  if(rdZoom > 1.05) { scrollContainer.style.alignItems = 'flex-start'; scrollContainer.style.justifyContent = 'flex-start'; }
  else { scrollContainer.style.alignItems = 'center'; scrollContainer.style.justifyContent = 'center'; }
  
  rdRenderBook();
}

function closeReader() { document.getElementById('readerOverlay').style.display = 'none'; rdURLs = []; }

// ==========================================
// ฟอร์มจัดการหนังสือ (CRUD)
// ==========================================
function handleSave(e) {
  e.preventDefault(); var file = document.getElementById('bookFile').files[0];
  var info = { rowIndex: parseInt(document.getElementById('rowIndex').value)||null, bookTitle: document.getElementById('bookTitle').value.trim(), existingUrl: document.getElementById('existingUrl').value||'', existingId: document.getElementById('existingId').value||'' };
  Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  if (file) { var rd = new FileReader(); rd.onload = function(ev) { info.fileBase64 = ev.target.result; submitData(info); }; rd.readAsDataURL(file); } else { submitData(info); }
}

function submitData(info) {
  callBackend('saveBook', info).then(res => {
    Swal.fire({ icon:'success', title:'บันทึกสำเร็จ!', timer:1500, showConfirmButton:false }); closeForm(); loadBooks();
  }).catch(err => Swal.fire('Error', err.message, 'error'));
}

function confirmDelete(rowIndex, fileId) {
  Swal.fire({ title: 'ใส่รหัสเพื่อลบข้อมูล', input: 'password', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'ลบทิ้ง' }).then(res => {
    if (res.isConfirmed && res.value === DEL_PASS) {
      Swal.fire({ title:'กำลังลบ...', didOpen:()=>Swal.showLoading() });
      callBackend('deleteBook', { rowIndex, fileId }).then(() => { Swal.fire({ icon:'success', title:'ลบแล้ว', timer:1500, showConfirmButton:false }); loadBooks(); });
    } else if (res.isConfirmed) Swal.fire('รหัสผิดพลาด', '', 'error');
  });
}

function openForm(isEdit, rowIndex) {
  document.getElementById('bookForm').reset(); document.getElementById('rowIndex').value = ''; document.getElementById('existingUrl').value = ''; document.getElementById('existingId').value = ''; document.getElementById('fileName').innerText = 'คลิกเพื่อเลือกไฟล์ PDF';
  if (isEdit && rowIndex) { var book = bookData.find(b => b.rowIndex === rowIndex); if (book) { document.getElementById('modalTitle').innerText = 'แก้ไขข้อมูล'; document.getElementById('rowIndex').value = rowIndex; document.getElementById('bookTitle').value = book['Book Title']; document.getElementById('existingUrl').value = book['File URL']||''; document.getElementById('existingId').value = book['File ID']||''; document.getElementById('fileName').innerText = '(มีไฟล์เดิมอยู่แล้ว)'; } } else { document.getElementById('modalTitle').innerText = 'ลงทะเบียนข้อมูลใหม่'; }
  document.getElementById('formModal').classList.remove('hidden'); document.getElementById('formModal').classList.add('flex');
}
function closeForm() { document.getElementById('formModal').classList.add('hidden'); document.getElementById('formModal').classList.remove('flex'); }
document.getElementById('bookFile').addEventListener('change', function() { document.getElementById('fileName').innerText = this.files[0] ? this.files[0].name : 'คลิกเพื่อเลือกไฟล์ PDF'; });
</script>
