<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>คลังความรู้ หน่วยไตเทียม</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Kanit', sans-serif;
      background: linear-gradient(160deg, #f0f7ff 0%, #dbeafe 40%, #eff6ff 100%);
      min-height: 100vh;
    }

    .header-card {
      background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 55%, #3b82f6 100%);
      border-radius: 24px;
      padding: 24px 32px;
      box-shadow: 0 8px 30px rgba(29,78,216,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
      margin-bottom: 32px;
    }
    .book-icon-anim { animation: book-bounce 3s ease-in-out infinite; display: inline-block; }
    @keyframes book-bounce {
      0%,100% { transform: translateY(0) rotate(-5deg) scale(1); }
      50%      { transform: translateY(-12px) rotate(5deg) scale(1.05); }
    }

    .room {
      background:
        repeating-linear-gradient(173deg, transparent 0px, transparent 9px, rgba(100,55,10,0.07) 9px, rgba(100,55,10,0.07) 10px, transparent 10px, transparent 19px, rgba(80,40,8,0.04) 19px, rgba(80,40,8,0.04) 20px),
        repeating-linear-gradient(167deg, transparent 0px, transparent 22px, rgba(140,80,20,0.05) 22px, rgba(140,80,20,0.05) 23px),
        linear-gradient(180deg, #D9A055 0%, #C4873A 25%, #B87428 50%, #C4873A 75%, #D9A055 100%);
      border-radius: 20px;
      padding: 20px 20px 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2), inset 0 2px 0 rgba(255,220,120,0.35), inset 0 -6px 15px rgba(0,0,0,0.18);
      position: relative; overflow: hidden;
    }
    .room::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
      background: linear-gradient(to right, transparent, rgba(255,235,150,0.4), transparent);
      border-radius: 20px 20px 0 0;
    }

    .shelf-unit { position: relative; }
    .book-row {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 10px; align-items: flex-end; padding: 16px 4px 0;
    }
    @media (max-width: 500px)  { .book-row { grid-template-columns: repeat(2,1fr); gap:8px; } }
    @media (min-width:501px) and (max-width:820px) { .book-row { grid-template-columns: repeat(3,1fr); } }

    .shelf-plank {
      height: 20px;
      background: linear-gradient(180deg,#E8A020 0%,#C8860A 20%,#A06808 50%,#C8860A 80%,#E8A020 100%);
      border-radius: 4px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5), inset 0 2px 0 rgba(255,220,100,0.4), inset 0 -2px 0 rgba(0,0,0,0.3);
      margin-bottom: 28px;
    }

    .book-scene { perspective: 800px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
    .book-3d {
      width: 100%; max-width: 130px; height: 175px; position: relative; transform-style: preserve-3d;
      transition: transform 0.4s cubic-bezier(0.23,1,0.32,1); filter: drop-shadow(3px 6px 12px rgba(0,0,0,0.45));
    }
    .book-scene:hover .book-3d { transform: rotateY(-28deg) translateX(7px) translateY(-10px); filter: drop-shadow(7px 14px 20px rgba(0,0,0,0.55)); }
    .book-cover {
      position: absolute; inset: 0; border-radius: 2px 10px 10px 2px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 12px 10px; text-align: center; color: white; font-size: 14px; font-weight: 600; line-height: 1.4; overflow: hidden; transform: translateZ(9px);
    }
    .book-cover::before {
      content: ''; position: absolute; top:0; left:0; width:14px; height:100%;
      background: linear-gradient(to right, rgba(0,0,0,0.42), rgba(0,0,0,0.1), transparent); pointer-events: none;
    }
    .book-cover::after {
      content: ''; position: absolute; top:4px; right:-7px; width:8px; height:calc(100% - 8px);
      background: repeating-linear-gradient(180deg,#f0e6d0 0,#f0e6d0 1px,#ddd0b0 1px,#ddd0b0 2px);
      border-radius:0 3px 3px 0; box-shadow:2px 0 5px rgba(0,0,0,0.18); pointer-events:none;
    }
    .book-spine-face {
      position: absolute; top:0; left:0; width:14px; height:175px;
      transform-origin: left center; transform: rotateY(90deg) translateX(7px); border-radius: 2px 0 0 2px;
      display: flex; align-items: center; justify-content: center; padding: 4px 2px; overflow: hidden;
    }
    .book-spine-face span { writing-mode: vertical-rl; transform: rotate(180deg); color: rgba(255,255,255,0.7); font-size: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-height: 140px; }
    
    .book-actions { display: flex; gap: 7px; margin-top: 9px; opacity: 0; transform: translateY(4px); transition: all 0.2s; pointer-events: none; }
    .book-scene:hover .book-actions { opacity:1; transform:translateY(0); pointer-events:auto; }
    .bk-btn {
      width:28px; height:28px; border-radius:50%; background:white; border:none; cursor:pointer; font-size:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.18); transition:all 0.15s; display:flex; align-items:center; justify-content:center;
    }
    .bk-btn:hover { transform:scale(1.2); }
    .bk-edit  { color:#3b82f6; } .bk-del   { color:#ef4444; } .bk-share { color:#00B900; }

    @media (max-width: 640px) {
      .book-3d { max-width: 150px; height: 195px; } 
      .book-cover { font-size: 24px !important; padding: 16px; line-height: 1.2; }
      .book-spine-face span { font-size: 14px !important; }
      .book-spine-face { height: 195px; }
      .book-actions { opacity: 1; transform: none; pointer-events: auto; } 
    }

    .drop-zone { border:2px dashed #60a5fa; border-radius:16px; transition:all 0.2s; cursor:pointer; }
    .drop-zone:hover, .drop-zone.dragover { border-color:#2563eb; background:#eff6ff; }
    .modal-bg { background:rgba(0,15,30,0.72); backdrop-filter:blur(10px); }

    /* E-Book Reader */
    #readerOverlay { position:fixed; inset:0; background:#111; z-index:300; display:none; flex-direction:column; }
    .rd-topbar { flex-shrink:0; display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:rgba(0,0,0,0.75); border-bottom:1px solid rgba(255,255,255,0.07); }
    .rd-title { color:#93c5fd; font-size:17px; font-weight:600; display:flex; align-items:center; gap:8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:calc(100vw - 120px); }
    .rd-close { flex-shrink:0; width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,0.1); border:none; color:white; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; transition:background 0.2s; }
    .rd-close:hover { background:rgba(96,165,250,0.3); }

    .rd-stage { flex:1; display:flex; align-items:center; min-height:0; overflow:hidden; }
    .rd-nav { flex-shrink:0; width:48px; height:100%; background:transparent; border:none; color:rgba(255,255,255,0.45); font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; z-index:20; }
    .rd-nav:hover:not(:disabled) { color:#60a5fa; background:rgba(255,255,255,0.04); }
    .rd-nav:disabled { opacity:0.18; cursor:default; }

    #rdScroll {
      flex:1; overflow:auto; min-width:0; min-height:0;
      display:flex; padding:16px; perspective:3000px;
      align-items:center; justify-content:center; 
    }

    #rdBook { position:relative; flex-shrink:0; box-shadow:0 12px 50px rgba(0,0,0,0.85); touch-action: pan-x pan-y; }

    .rd-half { position:absolute; top:0; overflow:hidden; background:#f5f0e8; }
    #rdHalfL { border-radius:4px 0 0 4px; }
    #rdHalfR { border-radius:0 4px 4px 0; }
    #rdSpine { position:absolute; top:0; z-index:3; background:linear-gradient(to right,rgba(0,0,0,0.22),rgba(0,0,0,0.04),rgba(0,0,0,0.22)); }
    #rdFlipEl { display:none; position:absolute; top:0; z-index:10; transform-style:preserve-3d; transition:transform 0.55s cubic-bezier(0.455,0.03,0.515,0.955); }
    .rd-face { position:absolute; inset:0; overflow:hidden; background:#f5f0e8; backface-visibility:hidden; -webkit-backface-visibility:hidden; }
    #rdFaceB { transform:rotateY(180deg); }
    .rd-face img { display:block; }
    #rdFlipShade { position:absolute; inset:0; pointer-events:none; z-index:2; opacity:0; transition:opacity 0.25s; }

    .rd-bottombar { flex-shrink:0; display:flex; align-items:center; justify-content:center; gap:8px; padding:8px 16px; background:rgba(0,0,0,0.75); border-top:1px solid rgba(255,255,255,0.07); }
    .zm-btn { width:32px; height:32px; border-radius:8px; background:rgba(255,255,255,0.1); border:none; color:white; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.15s; }
    .zm-btn:hover { background:rgba(96,165,250,0.28); color:#60a5fa; }
    #zoomLabel { min-width:46px; text-align:center; font-size:12px; color:rgba(255,255,255,0.7); background:rgba(255,255,255,0.08); border-radius:6px; padding:4px 8px; cursor:pointer; user-select:none; }
    .rd-sep   { width:1px; height:20px; background:rgba(255,255,255,0.12); margin:0 2px; }
    .rd-pginfo { font-size:12px; color:rgba(255,255,255,0.45); }

    /* Loading */
    #rdLoading { position:fixed; inset:0; z-index:400; background:linear-gradient(160deg,#0a192f 0%,#172a45 50%,#0a192f 100%); display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:'Kanit',sans-serif; color:white; text-align:center; padding:32px; }
    .rdl-icon { font-size:56px; color:#60a5fa; margin-bottom:20px; animation:rdl-pulse 1.8s ease-in-out infinite; }
    @keyframes rdl-pulse { 0%,100%{ transform:scale(1) rotate(-3deg); } 50% { transform:scale(1.12) rotate(3deg); } }
    .rdl-title { font-size:16px; font-weight:600; color:white; max-width:320px; margin-bottom:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .rdl-status { font-size:13px; color:rgba(96,165,250,0.8); margin-bottom:28px; }
    .rdl-bar-wrap { width:min(320px,80vw); height:8px; background:rgba(255,255,255,0.08); border-radius:4px; overflow:hidden; position:relative; box-shadow:0 0 0 1px rgba(96,165,250,0.15); }
    #rdProgBar { height:100%; width:0%; background:linear-gradient(to right,#2563eb,#60a5fa,#3b82f6); border-radius:4px; transition:width 0.25s ease; position:relative; overflow:hidden; }
    #rdProgBar::after { content:''; position:absolute; top:0; bottom:0; left:-60%; width:60%; background:linear-gradient(to right,transparent,rgba(255,255,255,0.5),transparent); animation:rdl-shine 1.4s infinite; }
    @keyframes rdl-shine { to { left:120%; } }
    .rdl-pct { margin-top:10px; font-size:22px; font-weight:700; color:#60a5fa; letter-spacing:1px; }
    .rdl-sub { margin-top:4px; font-size:11px; color:rgba(255,255,255,0.3); }
    #rdTitleSpinner { display:none; margin-left:8px; font-size:12px; color:#93c5fd; }
  </style>
</head>
<body class="p-4 md:p-8">
<div class="max-w-5xl mx-auto">

  <div class="header-card">
    <div class="flex flex-col sm:flex-row justify-between items-center gap-5">
      <div class="flex items-center gap-4">
        <div class="w-20 h-20 bg-blue-900/40 rounded-2xl flex items-center justify-center">
          <span class="book-icon-anim text-5xl" style="line-height:1">
            <i class="fas fa-book-medical text-blue-300"></i>
          </span>
        </div>
        <div>
          <h1 class="text-3xl md:text-4xl font-bold text-white">คลังความรู้</h1>
          <h2 class="text-xl md:text-2xl font-semibold text-blue-300 mt-0.5">หน่วยไตเทียม</h2>
          <p class="text-blue-200 text-xs mt-1">E-Book PDF Collection</p>
        </div>
      </div>
      <button onclick="openForm()"
        class="bg-white/20 hover:bg-white/30 active:scale-95 text-white px-7 py-3 rounded-full shadow-lg transition-all font-medium flex items-center gap-2 whitespace-nowrap border border-white/20">
        <i class="fas fa-plus-circle"></i> เพิ่มหนังสือใหม่
      </button>
    </div>
  </div>

  <div id="stateLoading" class="text-center py-20">
    <i class="fas fa-spinner fa-spin text-4xl text-blue-400 mb-4 block"></i>
    <p class="text-blue-800/50 text-sm">กำลังจัดเรียงหนังสือบนชั้น...</p>
  </div>
  <div id="stateError" class="hidden text-center py-20">
    <i class="fas fa-exclamation-triangle text-4xl text-red-400 mb-4 block"></i>
    <p id="errorMsg" class="text-red-400 text-sm mb-3"></p>
    <button onclick="loadBooks()" class="text-blue-600 underline text-sm">ลองใหม่</button>
  </div>
  <div id="stateEmpty" class="hidden text-center py-20">
    <i class="fas fa-book-open text-6xl text-blue-200 mb-4 block"></i>
    <p class="text-blue-600/50 mb-2">ยังไม่มีหนังสือบนชั้นวาง</p>
    <button onclick="openForm()" class="text-blue-500 hover:text-blue-600 underline text-sm">เพิ่มเล่มแรกเลย</button>
  </div>
  <div id="stateShelf" class="hidden">
    <div id="shelfContainer" class="room"></div>
  </div>

</div>

<div id="formModal" class="fixed inset-0 modal-bg z-50 hidden items-center justify-center p-4">
  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 relative">
    <button onclick="closeForm()" class="absolute top-5 right-5 text-slate-300 hover:text-slate-500 text-lg transition-colors">
      <i class="fas fa-times"></i>
    </button>
    <div class="flex items-center gap-3 mb-6">
      <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center">
        <i class="fas fa-book text-blue-500 text-lg"></i>
      </div>
      <h2 id="modalTitle" class="text-2xl font-bold text-blue-800">เพิ่มหนังสือใหม่</h2>
    </div>
    <form id="bookForm" onsubmit="handleSave(event)">
      <input type="hidden" id="rowIndex">
      <input type="hidden" id="existingUrl">
      <input type="hidden" id="existingId">
      <div class="mb-5">
        <label class="block text-sm font-medium text-slate-500 mb-2">ชื่อหนังสือ</label>
        <input type="text" id="bookTitle" required placeholder="ชื่อหนังสือ..."
          class="w-full px-4 py-3 bg-slate-50 rounded-2xl ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-400 outline-none transition-all text-slate-700">
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-slate-500 mb-2">ไฟล์ PDF</label>
        <div class="drop-zone p-5 text-center" id="dropZone" onclick="document.getElementById('bookFile').click()">
          <input type="file" id="bookFile" accept="application/pdf" class="hidden">
          <i class="fas fa-file-pdf text-blue-300 text-3xl mb-2 block"></i>
          <p id="fileName" class="text-xs text-slate-400">คลิกหรือลากไฟล์ PDF มาวางที่นี่</p>
        </div>
      </div>
      <div class="flex gap-3">
        <button type="button" onclick="closeForm()"
          class="flex-1 py-3 text-slate-400 hover:bg-slate-50 rounded-2xl transition-all font-medium">ยกเลิก</button>
        <button type="submit"
          class="flex-1 bg-blue-600 hover:bg-blue-700 active:scale-95 text-white py-3 rounded-2xl font-semibold shadow-md transition-all">
          <i class="fas fa-save mr-2"></i>บันทึก
        </button>
      </div>
    </form>
  </div>
</div>

<div id="readerOverlay">
  <div id="rdLoading">
    <i class="fas fa-book-open rdl-icon"></i>
    <div class="rdl-title" id="rdLoadTitle">กำลังโหลด...</div>
    <div class="rdl-status" id="rdLoadMsg">กำลังดาวน์โหลด PDF</div>
    <div class="rdl-bar-wrap"><div id="rdProgBar"></div></div>
    <div class="rdl-pct" id="rdLoadPct">0%</div>
    <div class="rdl-sub" id="rdProgTxt"></div>
  </div>

  <div class="rd-topbar">
    <div class="rd-title">
      <i class="fas fa-book-open"></i>
      <span id="readerTitle" style="margin-left:8px;">กำลังโหลด...</span>
      <i class="fas fa-spinner fa-spin" id="rdTitleSpinner"></i>
    </div>
    <button class="rd-close" onclick="closeReader()"><i class="fas fa-times"></i></button>
  </div>

  <div class="rd-stage">
    <button class="rd-nav" id="btnPrev" onclick="rdGoPrev()" disabled><i class="fas fa-chevron-left"></i></button>
    <div id="rdScroll">
      <div id="rdBook">
        <div class="rd-half" id="rdHalfL"></div>
        <div class="rd-half" id="rdHalfR"></div>
        <div id="rdSpine"></div>
        <div id="rdFlipEl">
          <div class="rd-face" id="rdFaceF"></div>
          <div class="rd-face" id="rdFaceB"></div>
          <div id="rdFlipShade"></div>
        </div>
      </div>
    </div>
    <button class="rd-nav" id="btnNext" onclick="rdGoNext()" disabled><i class="fas fa-chevron-right"></i></button>
  </div>

  <div class="rd-bottombar">
    <button class="zm-btn" onclick="rdZoomOut()" title="ย่อ"><i class="fas fa-search-minus"></i></button>
    <span id="zoomLabel" onclick="rdZoomReset()" title="รีเซ็ต">100%</span>
    <button class="zm-btn" onclick="rdZoomIn()" title="ขยาย"><i class="fas fa-search-plus"></i></button>
    <div class="rd-sep"></div>
    <span class="rd-pginfo" id="pageInfo">— / —</span>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ==========================================
// ⚙️ ตั้งค่า API (เปลี่ยนลิงก์ข้างล่างนี้ให้เป็นลิงก์ Web App ล่าสุดของคุณ)
// ==========================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbygfy7yad290Ox_Kdat3HqLPZm_2HhsiSwsFPl7SEZm6M3UXz604LT1hK9LvYMkhWuDYw/exec'; 

var DEL_PASS        = '1234';
var BOOKS_PER_SHELF = 4;
var PALETTE = [['#3b82f6','#1e3a8a'],['#0ea5e9','#082f49'],['#6366f1','#312e81'],['#8b5cf6','#4c1d95'],['#14b8a6','#134e4a'],['#2563eb','#1e40af']];
var bookData = [];

// ==========================================
// 🌉 สะพานเชื่อม (Hybrid API Bridge)
// ทำให้โค้ดเดียวใช้ได้ทั้งรันบน GAS และรันบน GitHub
// ==========================================
function callBackend(action, payload = {}) {
  return new Promise((resolve, reject) => {
    // โหมด 1: ถ้ารันอยู่บน Google Apps Script โดยตรง
    if (typeof google !== 'undefined' && google.script) {
      if (action === 'getBooks') { google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).getBooks(); }
      else if (action === 'getPdfData') { google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).getPdfData(payload.fileId); }
      else if (action === 'saveBook') { google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).saveBook(payload); }
      else if (action === 'deleteBook') { google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).deleteBook(payload.rowIndex, payload.fileId); }
    } 
    // โหมด 2: ถ้ารันอยู่บน GitHub Pages (หรือเว็บภายนอกอื่นๆ)
    else {
      fetch(GAS_URL + "?action=" + action, {
        method: "POST",
        body: JSON.stringify(payload),
        headers: { "Content-Type": "text/plain;charset=utf-8" } // ใช้ text/plain เลี่ยงปัญหา CORS 
      })
      .then(res => res.json())
      .then(data => {
        if (data && (data.error || data.success === false)) reject(new Error(data.error || data.message));
        else resolve(action === 'getBooks' || action === 'getPdfData' ? data : data);
      })
      .catch(reject);
    }
  });
}

window.onload = loadBooks;

function loadBooks() {
  setState('Loading');
  callBackend('getBooks')
    .then(function(res) {
      if (!res || res.error) { setState('Error', (res && res.error) || 'ไม่ได้รับข้อมูล'); return; }
      bookData = [];
      for (var i = 0; i < (res.length || 0); i++) { if (res[i] && res[i]['Book Title']) bookData.push(res[i]); }
      if (!bookData.length) { setState('Empty'); return; }
      renderBooks(); setState('Shelf');
    })
    .catch(function(err) { setState('Error', 'เชื่อมต่อไม่ได้: ' + err.message); });
}

function renderBooks() {
  var container = document.getElementById('shelfContainer');
  container.innerHTML = '';
  for (var i = 0; i < bookData.length; i += BOOKS_PER_SHELF) {
    var batch = bookData.slice(i, i + BOOKS_PER_SHELF);
    var unit  = document.createElement('div'); unit.className = 'shelf-unit';
    var row   = document.createElement('div'); row.className  = 'book-row';
    batch.forEach(function(book, bi) { row.appendChild(makeBook(book, i + bi)); });
    var plank = document.createElement('div'); plank.className = 'shelf-plank';
    unit.appendChild(row); unit.appendChild(plank); container.appendChild(unit);
  }
}

function makeBook(book, idx) {
  var pair  = PALETTE[idx % PALETTE.length];
  var title = String(book['Book Title'] || '(ไม่มีชื่อ)');
  var fid   = String(book['File ID']  || '');
  var furl  = String(book['File URL'] || '');
  var ri    = book.rowIndex;
  var eT = title.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
  var eF = fid.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  var eU = furl.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

  var scene = document.createElement('div'); scene.className = 'book-scene';
  scene.innerHTML =
    '<div class="book-3d" onclick="openReader(\'' + eF + '\',\'' + eT + '\')">' +
      '<div class="book-spine-face" style="background:' + pair[1] + ';"><span>' + title + '</span></div>' +
      '<div class="book-cover" style="background:linear-gradient(150deg,' + pair[0] + ',' + pair[1] + ');"><i class="fas fa-book text-white/20 text-2xl mb-2"></i><span>' + title + '</span></div>' +
    '</div><div class="book-actions">' +
      '<button class="bk-btn bk-share" onclick="event.stopPropagation();shareBook(\'' + eU + '\',\'' + eT + '\')" title="แชร์ LINE"><i class="fas fa-share-alt"></i></button>' +
      '<button class="bk-btn bk-edit"  onclick="event.stopPropagation();openForm(true,' + ri + ')" title="แก้ไข"><i class="fas fa-pen"></i></button>' +
      '<button class="bk-btn bk-del"   onclick="event.stopPropagation();confirmDelete(' + ri + ',\'' + eF + '\')" title="ลบ"><i class="fas fa-trash"></i></button>' +
    '</div>';
  return scene;
}

// ════════════════════════════════════════
// E-BOOK READER CORE
// ════════════════════════════════════════
var rdURLs = []; var rdLeft = -1; var rdRight = 0; var rdFlipping = false; var rdPageW = 0; var rdPageH = 0; var rdZoom = 1.0; var rdMobile = false;

function rdImg(idx, w, h) {
  if (idx < 0 || idx >= rdURLs.length) return null;
  var img = new Image(); img.src = rdURLs[idx]; img.style.cssText = 'display:block;width:' + w + 'px;height:' + h + 'px;'; return img;
}

function openReader(fileId, title) {
  if (!fileId) { Swal.fire({icon:'info',title:'ไม่มีไฟล์ PDF'}); return; }
  rdURLs=[]; rdLeft=-1; rdRight=0; rdFlipping=false; rdSetZoom(1.0); rdPageW=0; rdPageH=0;
  document.getElementById('pageInfo').textContent  = '— / —';
  document.getElementById('btnPrev').disabled = true; document.getElementById('btnNext').disabled = true;
  document.getElementById('rdHalfL').innerHTML = ''; document.getElementById('rdHalfR').innerHTML = '';
  document.getElementById('rdHalfR').style.display = ''; document.getElementById('rdSpine').style.display  = '';
  document.getElementById('rdBook').style.cssText   = ''; document.getElementById('rdFlipEl').style.display = 'none';
  document.getElementById('readerTitle').textContent = title; document.getElementById('rdLoadTitle').textContent = title;
  document.getElementById('rdTitleSpinner').style.display = 'inline'; document.getElementById('readerOverlay').style.display  = 'flex';
  rdShowLoad('กำลังดาวน์โหลด PDF...', 0, '');

  // เปลี่ยนมาใช้ API Bridge
  callBackend('getPdfData', { fileId: fileId })
    .then(function(res) {
      if (!res || !res.success) { rdErrMsg('โหลดไม่สำเร็จ: ' + (res&&res.error||'unknown')); return; }
      buildReader(res.data);
    })
    .catch(function(err) { rdErrMsg('ข้อผิดพลาด: ' + err.message); });
}

async function buildReader(b64) {
  try {
    rdShowLoad('กำลังประมวลผลความคมชัดสูง...', 0, '');
    var bin = atob(b64), bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    var pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
    var nPages = pdf.numPages; rdMobile = window.innerWidth < 640;
    var maxW = rdMobile ? (window.innerWidth - 40) : Math.min((window.innerWidth - 120) / 2, 520);
    var maxH = window.innerHeight - 130;
    var pg0 = await pdf.getPage(1); var vp0 = pg0.getViewport({ scale: 1 });
    var scale = Math.min(maxW / vp0.width, maxH / vp0.height, 3.0);
    
    var dpr = Math.max(window.devicePixelRatio || 1, 2.0);
    var renderScale = scale * dpr * 2.0; 

    rdPageW = Math.ceil(vp0.width  * scale); rdPageH = Math.ceil(vp0.height * scale);
    rdURLs = [];
    for (var p = 1; p <= nPages; p++) {
      var pct = Math.round(p / nPages * 100);
      rdShowLoad('กำลังสร้างภาพ...', pct, p + ' / ' + nPages + ' หน้า');
      var page = await pdf.getPage(p);
      var vp = page.getViewport({ scale: renderScale });
      var c = document.createElement('canvas'); c.width  = Math.ceil(vp.width); c.height = Math.ceil(vp.height);
      await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
      rdURLs.push(c.toDataURL()); c = null;
    }
    document.getElementById('rdLoading').style.display  = 'none'; document.getElementById('rdTitleSpinner').style.display = 'none';
    rdLeft  = rdMobile ? 0 : -1; rdRight = rdMobile ? -1 : 0; rdRenderBook();
  } catch(err) { rdErrMsg('เกิดข้อผิดพลาด: ' + err.message); }
}

function rdRenderBook() {
  var w = Math.round(rdPageW * rdZoom); var h = Math.round(rdPageH * rdZoom); var book = document.getElementById('rdBook');
  if (rdMobile) {
    book.style.cssText = 'position:relative;width:' + w + 'px;height:' + h + 'px;';
    document.getElementById('rdHalfL').style.cssText = 'position:absolute;top:0;left:0;width:'+w+'px;height:'+h+'px;overflow:hidden;background:#f5f0e8;border-radius:4px;';
    document.getElementById('rdHalfR').style.display = 'none'; document.getElementById('rdSpine').style.display = 'none';
  } else {
    book.style.cssText = 'position:relative;width:'+(w*2)+'px;height:'+h+'px;';
    document.getElementById('rdHalfL').style.cssText = 'position:absolute;top:0;left:0;width:'+w+'px;height:'+h+'px;overflow:hidden;background:#f5f0e8;border-radius:4px 0 0 4px;';
    document.getElementById('rdHalfR').style.cssText = 'position:absolute;top:0;left:'+w+'px;width:'+w+'px;height:'+h+'px;overflow:hidden;background:#f5f0e8;border-radius:0 4px 4px 0;';
    document.getElementById('rdHalfR').style.display = '';
    document.getElementById('rdSpine').style.cssText = 'position:absolute;top:0;left:'+(w-2)+'px;width:4px;height:'+h+'px;z-index:3;background:linear-gradient(to right,rgba(0,0,0,0.22),rgba(0,0,0,0.04),rgba(0,0,0,0.22));';
    document.getElementById('rdSpine').style.display = '';
  }
  rdFillHalf('rdHalfL', rdLeft,  w, h); rdFillHalf('rdHalfR', rdRight, w, h); rdUpdateInfo();
}

function rdFillHalf(id, idx, w, h) { var el = document.getElementById(id); el.innerHTML = ''; var img = rdImg(idx, w, h); if (img) el.appendChild(img); }

function rdUpdateInfo() {
  var n = rdURLs.length; var cur = rdMobile ? rdLeft + 1 : Math.max(rdLeft, 0) + 1; var end = rdMobile ? rdLeft + 1 : (rdRight >= 0 && rdRight < n ? rdRight + 1 : cur);
  document.getElementById('pageInfo').textContent = (cur === end ? cur : cur + '–' + end) + ' / ' + n;
  document.getElementById('btnPrev').disabled = rdMobile ? rdLeft <= 0 : rdLeft <= -1;
  document.getElementById('btnNext').disabled = rdMobile ? rdLeft + 1 >= n : (rdRight < 0 ? rdLeft + 1 >= n : rdRight + 1 >= n);
}

function rdZoomIn()    { rdSetZoom(Math.min(rdZoom+0.25, 4.0)); }
function rdZoomOut()   { rdSetZoom(Math.max(rdZoom-0.25, 0.5)); }
function rdZoomReset() { rdSetZoom(1.0); }

function rdSetZoom(z) {
  z = Math.max(0.5, Math.min(z, 5.0)); rdZoom = z;
  document.getElementById('zoomLabel').textContent = Math.round(z*100) + '%';
  var scroll = document.getElementById('rdScroll');
  if (z > 1.0) { scroll.style.alignItems = 'flex-start'; scroll.style.justifyContent = 'flex-start'; } 
  else { scroll.style.alignItems = 'center'; scroll.style.justifyContent = 'center'; }
  if (rdURLs.length > 0) rdRenderBook();
}

var rdD = { on:false, dir:'', sx:0, pageW:0, angle:0, fIdx:-1, bIdx:-1, nL:-1, nR:-1 };
function rdSetupFlip(dir) {
  var w  = Math.round(rdPageW * rdZoom); var h  = Math.round(rdPageH * rdZoom);
  var fe = document.getElementById('rdFlipEl'); var ff = document.getElementById('rdFaceF'); var fb = document.getElementById('rdFaceB'); var shd= document.getElementById('rdFlipShade');
  if (dir === 'next') {
    rdD.fIdx = rdMobile ? rdLeft   : rdRight; rdD.bIdx = rdMobile ? rdLeft+1 : rdRight+1; rdD.nL   = rdMobile ? rdLeft+1  : (rdRight >= 0 ? rdRight+1 : 0); rdD.nR   = rdMobile ? -1        : (rdRight >= 0 ? rdRight+2 : 1);
    fe.style.cssText = 'display:block;position:absolute;top:0;left:'+(rdMobile?'0':w+'px')+';width:'+w+'px;height:'+h+'px;transform-style:preserve-3d;transform-origin:left top;transform:rotateY(0deg);transition:none;z-index:10;';
    shd.style.background='linear-gradient(to left,rgba(0,0,0,0.32),transparent 55%)'; document.getElementById(rdMobile?'rdHalfL':'rdHalfR').style.visibility='hidden';
  } else {
    rdD.fIdx = rdLeft; rdD.bIdx = rdLeft - 1; rdD.nR   = rdLeft - 1; rdD.nL   = rdLeft - 2;
    fe.style.cssText = 'display:block;position:absolute;top:0;left:0;width:'+w+'px;height:'+h+'px;transform-style:preserve-3d;transform-origin:right top;transform:rotateY(0deg);transition:none;z-index:10;';
    shd.style.background='linear-gradient(to right,rgba(0,0,0,0.32),transparent 55%)'; document.getElementById('rdHalfL').style.visibility='hidden';
  }
  ff.innerHTML=''; fb.innerHTML=''; var iF=rdImg(rdD.fIdx,w,h); if(iF) ff.appendChild(iF); var iB=rdImg(rdD.bIdx,w,h); if(iB) fb.appendChild(iB);
  shd.style.opacity='0'; shd.style.transition=''; rdD.pageW = w;
}

function rdCommit(dir) {
  rdFlipping = true; var fe  = document.getElementById('rdFlipEl'); var shd = document.getElementById('rdFlipShade'); var target = dir==='next' ? -180 : 180;
  fe.style.transition  = 'transform 0.38s cubic-bezier(0.25,0.46,0.45,0.94)'; fe.style.transform   = 'rotateY('+target+'deg)'; shd.style.transition = 'opacity 0.15s'; shd.style.opacity    = '0.9';
  setTimeout(function(){ shd.style.opacity='0'; }, 190);
  setTimeout(function() { if (rdMobile) { rdLeft=rdD.nL; rdRight=-1; } else { rdLeft=rdD.nL; rdRight=rdD.nR; } document.getElementById('rdHalfL').style.visibility=''; document.getElementById('rdHalfR').style.visibility=''; fe.style.display='none'; fe.style.transition='none'; rdRenderBook(); rdFlipping=false; }, 390);
}

function rdCancel() {
  rdFlipping = true; var fe = document.getElementById('rdFlipEl'); fe.style.transition = 'transform 0.28s ease-out'; fe.style.transform  = 'rotateY(0deg)'; document.getElementById('rdFlipShade').style.opacity = '0';
  setTimeout(function() { document.getElementById('rdHalfL').style.visibility=''; document.getElementById('rdHalfR').style.visibility=''; fe.style.display='none'; fe.style.transition='none'; rdFlipping=false; }, 290);
}

function rdGoNext() { if (rdFlipping || rdD.on) return; var canNext = rdMobile ? rdLeft+1<rdURLs.length : (rdRight>=0 && rdRight<rdURLs.length); if (!canNext) return; rdSetupFlip('next'); rdCommit('next'); }
function rdGoPrev() { if (rdFlipping || rdD.on) return; var canPrev = rdMobile ? rdLeft>0 : rdLeft>=0; if (!canPrev) return; rdSetupFlip('prev'); rdCommit('prev'); }

(function() {
  var book = document.getElementById('rdBook'); var scrollContainer = document.getElementById('rdScroll'); book.style.cursor = 'grab';
  var pinchDist = 0; var pinchZoom = 1;

  function startDrag(clientX, clientY) {
    if (rdFlipping || rdURLs.length === 0 || rdD.on) return false;
    if (rdZoom > 1.05) return false; 
    var rect = book.getBoundingClientRect(); var x = clientX - rect.left; var dir = (x > rect.width / 2) ? 'next' : 'prev'; 
    var canNext = rdMobile ? rdLeft+1 < rdURLs.length : (rdRight >= 0 && rdRight < rdURLs.length); var canPrev = rdMobile ? rdLeft > 0 : rdLeft >= 0;
    if (dir==='next' && !canNext && canPrev) dir = 'prev'; if (dir==='prev' && !canPrev && canNext) dir = 'next';
    if (dir==='next' && !canNext) return false; if (dir==='prev' && !canPrev) return false;
    rdSetupFlip(dir); rdD.on = true; rdD.dir = dir; rdD.sx = clientX; rdD.angle = 0; return true;
  }
  function moveDrag(clientX) {
    if (!rdD.on) return; var dx = clientX - rdD.sx; var pct = Math.abs(dx) / Math.max(rdD.pageW, 1); var ang = 0;
    if (rdD.dir === 'next' && dx < 0) ang = Math.max(-180, pct * -180); if (rdD.dir === 'prev' && dx > 0) ang = Math.min( 180, pct * 180);
    rdD.angle = ang; document.getElementById('rdFlipEl').style.transform = 'rotateY(' + ang + 'deg)'; document.getElementById('rdFlipShade').style.opacity = String(Math.min(0.9, Math.abs(ang) / 90));
  }
  function endDrag() { if (!rdD.on) return; rdD.on = false; if (Math.abs(rdD.angle) > 60) rdCommit(rdD.dir); else rdCancel(); }

  scrollContainer.addEventListener('touchstart', function(e) {
    if (e.touches.length === 2) { rdD.on = false; var dx = e.touches[0].clientX - e.touches[1].clientX; var dy = e.touches[0].clientY - e.touches[1].clientY; pinchDist = Math.sqrt(dx*dx + dy*dy); pinchZoom = rdZoom; }
  }, { passive: false });
  scrollContainer.addEventListener('touchmove', function(e) {
    if (e.touches.length === 2 && pinchDist > 0) {
      e.preventDefault(); var dx = e.touches[0].clientX - e.touches[1].clientX; var dy = e.touches[0].clientY - e.touches[1].clientY; var newDist = Math.sqrt(dx*dx + dy*dy); var newZ = pinchZoom * (newDist / pinchDist);
      newZ = Math.max(0.5, Math.min(newZ, 5.0)); book.style.transform = 'scale(' + (newZ / pinchZoom) + ')'; book.style.transformOrigin = 'center center';
    }
  }, { passive: false });
  scrollContainer.addEventListener('touchend', function(e) {
    if (pinchDist > 0 && e.touches.length < 2) {
      pinchDist = 0; var match = book.style.transform.match(/scale\(([^)]+)\)/);
      if (match) { var finalZ = pinchZoom * parseFloat(match[1]); book.style.transform = 'none'; rdSetZoom(finalZ); }
    }
  }, { passive: true });

  book.addEventListener('touchstart', function(e) { if (e.touches.length === 1 && !pinchDist) { startDrag(e.touches[0].clientX, e.touches[0].clientY); } }, { passive: true });
  book.addEventListener('touchmove', function(e) {
    if (!rdD.on) return; 
    var dx = e.touches[0].clientX - rdD.sx; if (Math.abs(dx) > 8 && e.cancelable) { e.preventDefault(); } moveDrag(e.touches[0].clientX);
  }, { passive: false });
  book.addEventListener('touchend', function(e) { if(e.touches.length === 0) endDrag(); }, { passive: true });
  
  book.addEventListener('mousedown', function(e) { if(startDrag(e.clientX, e.clientY)){ e.preventDefault(); book.style.cursor='grabbing'; }});
  document.addEventListener('mousemove', function(e) { if(rdD.on) moveDrag(e.clientX); });
  document.addEventListener('mouseup', function() { endDrag(); book.style.cursor='grab'; });
})();

function closeReader() {
  document.getElementById('readerOverlay').style.display = 'none'; document.getElementById('rdTitleSpinner').style.display = 'none'; document.getElementById('rdFlipEl').style.display = 'none';
  document.getElementById('rdHalfL').innerHTML = ''; document.getElementById('rdHalfR').innerHTML = ''; document.getElementById('rdBook').style.cssText = ''; rdURLs=[]; rdLeft=-1; rdRight=0; rdFlipping=false; rdZoom=1.0; document.getElementById('rdLoading').style.display = 'flex';
}
function rdShowLoad(msg, pct, sub) { var el = document.getElementById('rdLoading'); el.style.display = 'flex'; var m = document.getElementById('rdLoadMsg'); if (m) m.textContent = msg; var b = document.getElementById('rdProgBar'); if (b) b.style.width = pct + '%'; var p = document.getElementById('rdLoadPct'); if (p) p.textContent = pct + '%'; var t = document.getElementById('rdProgTxt'); if (t) t.textContent = sub || ''; }
function rdErrMsg(msg) { document.getElementById('rdTitleSpinner').style.display = 'none'; document.getElementById('rdLoading').innerHTML = '<i class="fas fa-exclamation-circle" style="font-size:48px;color:#f87171;margin-bottom:16px;"></i><p style="color:#f87171;font-size:14px;font-family:Kanit;max-width:280px;">' + msg + '</p><button onclick="closeReader()" style="margin-top:20px;background:#f87171;color:white;border:none;border-radius:20px;padding:8px 24px;font-family:Kanit;cursor:pointer;">ปิด</button>'; }

function shareBook(url, title) {
  if (!url) return; var lineUrl = 'https://line.me/R/msg/text/?' + encodeURIComponent('📚 ' + title + '\n\n' + url);
  Swal.fire({ title: '<span style="font-family:Kanit;color:#00B900"><i class="fab fa-line mr-2"></i>แชร์หนังสือ</span>', html: '<p style="font-family:Kanit;font-size:13px;color:#555;margin-bottom:10px;">' + title + '</p><div style="background:#f5f5f5;border-radius:10px;padding:10px 12px;font-size:11px;word-break:break-all;color:#444;text-align:left;">' + url + '</div>', showDenyButton: true, showCancelButton: false, confirmButtonText: '<i class="fab fa-line mr-1"></i> เปิด LINE', denyButtonText: '<i class="fas fa-copy mr-1"></i> คัดลอกลิงค์', confirmButtonColor: '#00B900', denyButtonColor: '#6b7280' }).then(function(r) { if (r.isConfirmed) { window.open(lineUrl, '_blank'); } else if (r.isDenied) { if (navigator.clipboard) { navigator.clipboard.writeText(url).then(function() { Swal.fire({ icon:'success', title:'คัดลอกแล้ว!', timer:1200, showConfirmButton:false }); }); } else { var ta=document.createElement('textarea'); ta.value=url; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); Swal.fire({ icon:'success', title:'คัดลอกแล้ว!', timer:1200, showConfirmButton:false }); } } });
}

function handleSave(e) {
  e.preventDefault(); var file = document.getElementById('bookFile').files[0]; var info = { rowIndex: parseInt(document.getElementById('rowIndex').value)||null, bookTitle: document.getElementById('bookTitle').value.trim(), existingUrl: document.getElementById('existingUrl').value||'', existingId: document.getElementById('existingId').value||'' };
  if (!file && !info.existingUrl) { Swal.fire({ icon:'warning', title:'กรุณาเลือกไฟล์ PDF' }); return; }
  Swal.fire({ title: 'กำลังนำหนังสือขึ้นชั้น...', html: '<span style="font-family:Kanit;font-size:13px;color:#999">อาจใช้เวลา 10–30 วินาที</span>', allowOutsideClick: false, didOpen: function() { Swal.showLoading(); } });
  if (file) { var rd = new FileReader(); rd.onload = function(ev) { info.fileBase64 = ev.target.result; submitData(info); }; rd.readAsDataURL(file); } else { submitData(info); }
}

function submitData(info) {
  callBackend('saveBook', info)
    .then(function(res) {
      if (res && res.success) { Swal.fire({ icon:'success', title:'บันทึกสำเร็จ!', timer:1500, showConfirmButton:false }); closeForm(); loadBooks(); } 
      else { Swal.fire({ icon:'error', title:'บันทึกไม่สำเร็จ', text:res.message }); }
    }).catch(function(err) { Swal.fire({ icon:'error', title:'ข้อผิดพลาด', text:err.message }); });
}

function confirmDelete(rowIndex, fileId) {
  Swal.fire({
    title: '<span style="font-family:Kanit">ยืนยันการลบ</span>', html: '<input type="password" id="delPassInput" class="swal2-input" placeholder="รหัสผ่าน" autocomplete="off">', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'ลบเลย', cancelButtonText: 'ยกเลิก',
    preConfirm: function() { if ((document.getElementById('delPassInput').value||'') !== DEL_PASS) { Swal.showValidationMessage('รหัสผ่านไม่ถูกต้อง'); return false; } }
  }).then(function(r) {
    if (!r.isConfirmed) return;
    Swal.fire({ title:'กำลังลบ...', allowOutsideClick:false, didOpen:function(){ Swal.showLoading(); } });
    callBackend('deleteBook', { rowIndex: rowIndex, fileId: fileId })
      .then(function(res) { if (res && res.success) { Swal.fire({ icon:'success', title:'ลบเรียบร้อย!', timer:1200, showConfirmButton:false }); loadBooks(); } else Swal.fire({ icon:'error', title:'ลบไม่สำเร็จ', text:res.message }); })
      .catch(function(err) { Swal.fire({ icon:'error', title:'ข้อผิดพลาด', text:err.message }); });
  });
}

function openForm(isEdit, rowIndex) {
  document.getElementById('bookForm').reset(); document.getElementById('fileName').innerText = 'คลิกหรือลากไฟล์ PDF มาวางที่นี่'; document.getElementById('rowIndex').value = ''; document.getElementById('existingUrl').value = ''; document.getElementById('existingId').value = '';
  if (isEdit && rowIndex) { var book = bookData.find(b => b.rowIndex === rowIndex); if (!book) return; document.getElementById('modalTitle').innerText = 'แก้ไขหนังสือ'; document.getElementById('rowIndex').value = rowIndex; document.getElementById('bookTitle').value = book['Book Title']; document.getElementById('existingUrl').value = book['File URL']||''; document.getElementById('existingId').value = book['File ID']||''; if (book['File URL']) document.getElementById('fileName').innerText = '(มีไฟล์เดิม — เลือกใหม่เพื่อเปลี่ยน)'; } else { document.getElementById('modalTitle').innerText = 'เพิ่มหนังสือใหม่'; }
  document.getElementById('formModal').classList.remove('hidden'); document.getElementById('formModal').classList.add('flex');
}
function closeForm() { document.getElementById('formModal').classList.add('hidden'); document.getElementById('formModal').classList.remove('flex'); }
document.getElementById('formModal').addEventListener('click', function(e) { if (e.target === this) closeForm(); });
document.getElementById('bookFile').addEventListener('change', function() { document.getElementById('fileName').innerText = this.files[0] ? this.files[0].name : 'คลิกหรือลากไฟล์ PDF มาวางที่นี่'; });

function setState(s, msg) { ['Loading','Error','Empty','Shelf'].forEach(function(n) { document.getElementById('state' + n).classList.add('hidden'); }); document.getElementById('state' + s).classList.remove('hidden'); if (s === 'Error' && msg) document.getElementById('errorMsg').innerText = msg; }
</script>
